# Local development services.
# Rock8Cloud provides managed PostgreSQL and S3 storage in deployment —
# this compose file only mirrors them for local development.
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: uncomment to exercise the S3 upload path locally (mirrors
  # Rock8Cloud S3 Object Storage). Then set the S3_* vars in apps/strapi/.env:
  #   S3_ENDPOINT=http://localhost:9000
  #   S3_BUCKET=strapi-uploads
  #   S3_REGION=us-east-1
  #   S3_ACCESS_KEY=minioadmin
  #   S3_SECRET_KEY=minioadmin
  #   S3_PUBLIC_URL=http://localhost:9000/strapi-uploads
  #
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   ports:
  #     - "9000:9000"
